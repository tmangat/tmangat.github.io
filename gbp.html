<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Good Boy Points Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap');
        
        body {
            font-family: 'Nunito', sans-serif;
        }

        @keyframes pop {
            0% { transform: scale(1); }
            50% { transform: scale(1.15); }
            100% { transform: scale(1); }
        }
        
        .animate-pop { 
            animation: pop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        /* Hide scrollbar for clean UI */
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-gradient-to-br from-sky-200 via-indigo-100 to-purple-200 min-h-screen flex items-center justify-center p-4">

    <!-- Loading State -->
    <div id="loading" class="flex flex-col items-center justify-center text-indigo-500">
        <svg class="animate-spin h-10 w-10 mb-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
        </svg>
        <p class="font-bold animate-pulse">Loading Tracker...</p>
    </div>

    <!-- Main App UI -->
    <div id="app" class="hidden w-full max-w-sm glass-panel rounded-3xl shadow-2xl p-8 text-center relative overflow-hidden">
        
        <!-- Decorative Background Blobs -->
        <div class="absolute -top-10 -left-10 w-32 h-32 bg-sky-300 rounded-full mix-blend-multiply filter blur-2xl opacity-50"></div>
        <div class="absolute -bottom-10 -right-10 w-32 h-32 bg-purple-300 rounded-full mix-blend-multiply filter blur-2xl opacity-50"></div>

        <div class="relative z-10">
            <div class="mb-2 inline-flex items-center justify-center w-16 h-16 bg-indigo-100 text-indigo-500 rounded-full text-3xl shadow-inner">
                🌟
            </div>
            <h1 class="text-3xl font-black text-gray-800 tracking-tight mt-2">Good Boy Points</h1>
            <p class="text-pink-500 font-bold text-sm mt-1 mb-8">Redeemable for acts of a highly classified nature 😈</p>

            <!-- Balance Display -->
            <div class="bg-white rounded-2xl py-8 px-4 shadow-sm border border-gray-100 mb-8 relative">
                <div class="text-xs uppercase tracking-widest font-bold text-gray-400 mb-2">Current Balance</div>
                <div id="balance" class="text-7xl font-black text-indigo-600 transition-colors duration-300">
                    0
                </div>
            </div>

            <!-- Controls -->
            <div class="flex flex-col items-center gap-5">
                <!-- Custom Amount Input -->
                <div class="flex items-center gap-3 bg-white/60 p-2 rounded-2xl border border-gray-200 shadow-sm backdrop-blur-sm">
                    <label for="point-amount" class="text-xs font-bold text-gray-500 uppercase tracking-wider pl-2">Amount:</label>
                    <input type="number" id="point-amount" value="1" min="1" class="w-24 text-center text-xl font-black text-indigo-600 rounded-xl border-none focus:ring-2 focus:ring-indigo-400 bg-white shadow-inner py-2 outline-none">
                </div>

                <div class="flex items-center justify-center gap-6 w-full">
                    <!-- Subtract Button -->
                    <button onclick="adjustPoints(-1)" class="group flex flex-col items-center focus:outline-none transition-transform hover:scale-105 active:scale-95">
                        <div class="w-16 h-16 bg-red-100 text-red-500 rounded-full flex items-center justify-center shadow-md group-hover:bg-red-200 group-active:bg-red-300 transition-colors">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M20 12H4" />
                            </svg>
                        </div>
                        <span class="mt-2 text-sm font-bold text-red-500">Subtract</span>
                    </button>

                    <!-- Add Button -->
                    <button onclick="adjustPoints(1)" class="group flex flex-col items-center focus:outline-none transition-transform hover:scale-105 active:scale-95">
                        <div class="w-20 h-20 bg-green-500 text-white rounded-full flex items-center justify-center shadow-lg shadow-green-500/40 group-hover:bg-green-600 group-active:bg-green-700 transition-colors">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4" />
                            </svg>
                        </div>
                        <span class="mt-2 text-sm font-black text-green-600">Add</span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Firebase Logic -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, onSnapshot, setDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Environment variables provided by Canvas
        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {};
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let user = null;
        let currentDisplayVal = 0;
        
        // This is a shared public document so both you and your wife can see the exact same balance
        const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'tracker', 'sharedBalance');

        // Authenticate user securely
        const initAuth = async () => {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (err) {
                console.error("Authentication error:", err);
            }
        };

        // Start Auth process
        initAuth();

        // Listen for Authentication state
        onAuthStateChanged(auth, (u) => {
            user = u;
            if (user) {
                setupDatabaseListener();
                
                // Hide loading, show app
                document.getElementById('loading').classList.add('hidden');
                document.getElementById('app').classList.remove('hidden');
            }
        });

        // Listen to live database changes
        function setupDatabaseListener() {
            onSnapshot(docRef, (docSnap) => {
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    updateDisplay(data.balance);
                } else {
                    // Initialize the document if it doesn't exist yet
                    setDoc(docRef, { balance: 0 });
                    updateDisplay(0);
                }
            }, (error) => {
                console.error("Database sync error:", error);
            });
        }

        // Update the UI with fun animations
        function updateDisplay(val) {
            const el = document.getElementById('balance');
            
            // Only animate if the value actually changed
            if (currentDisplayVal !== val) {
                // Reset animation
                el.classList.remove('animate-pop');
                void el.offsetWidth; // Trigger reflow to restart animation
                el.classList.add('animate-pop');
                
                // Flash colors based on positive/negative change
                if (val > currentDisplayVal) {
                    el.classList.remove('text-indigo-600', 'text-red-500');
                    el.classList.add('text-green-500');
                } else if (val < currentDisplayVal) {
                    el.classList.remove('text-indigo-600', 'text-green-500');
                    el.classList.add('text-red-500');
                }

                // Return to default color after animation
                setTimeout(() => {
                    el.classList.remove('text-green-500', 'text-red-500');
                    el.classList.add('text-indigo-600');
                }, 300);
            }
            
            currentDisplayVal = val;
            el.innerText = val;
        }

        // Handle button clicks globally
        window.adjustPoints = async (multiplier) => {
            if (!user) return;
            
            const amountInput = document.getElementById('point-amount');
            const amountVal = parseInt(amountInput.value) || 1;
            const pointsToApply = amountVal * multiplier;
            
            const newBalance = currentDisplayVal + pointsToApply;
            
            // Optimistically update UI so it feels instant
            updateDisplay(newBalance);
            
            try {
                // Save to cloud
                await setDoc(docRef, { balance: newBalance }, { merge: true });
            } catch (e) {
                console.error("Error saving points:", e);
                // Revert to database state if save fails
                setupDatabaseListener(); 
            }
        }
    </script>
</body>
</html>
