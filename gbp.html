<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Good Boy Points Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap');
        
        body {
            font-family: 'Nunito', sans-serif;
        }

        @keyframes pop {
            0% { transform: scale(1); }
            50% { transform: scale(1.15); }
            100% { transform: scale(1); }
        }
        
        .animate-pop { 
            animation: pop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        /* Hide scrollbar for clean UI */
        ::-webkit-scrollbar { display: none; }
        
        /* Hide arrows on number input */
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { 
            -webkit-appearance: none; 
            margin: 0; 
        }
        input[type=number] {
            -moz-appearance: textfield;
        }

        .amt-btn {
            transition: all 0.15s ease-in-out;
        }
        .amt-btn.active {
            background-color: #6366f1;
            color: white;
            box-shadow: 0 4px 6px -1px rgba(99, 102, 241, 0.4);
            border-color: transparent;
        }
        .amt-btn:not(.active) {
            background-color: white;
            color: #4f46e5;
            border: 1px solid #e0e7ff;
        }
        .amt-btn:not(.active):hover {
            background-color: #eef2ff;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-sky-200 via-indigo-100 to-purple-200 min-h-screen flex items-center justify-center p-4">

    <!-- Main App UI -->
    <div id="app" class="w-full max-w-sm glass-panel rounded-3xl shadow-2xl p-8 text-center relative overflow-hidden">
        
        <!-- Decorative Background Blobs -->
        <div class="absolute -top-10 -left-10 w-32 h-32 bg-sky-300 rounded-full mix-blend-multiply filter blur-2xl opacity-50"></div>
        <div class="absolute -bottom-10 -right-10 w-32 h-32 bg-purple-300 rounded-full mix-blend-multiply filter blur-2xl opacity-50"></div>

        <div class="relative z-10">
            <div class="mb-2 inline-flex items-center justify-center w-16 h-16 bg-indigo-100 text-indigo-500 rounded-full text-3xl shadow-inner">
                😈
            </div>
            <h1 class="text-3xl font-black text-gray-800 tracking-tight mt-2">Good Boy Points</h1>
            <p class="text-gray-500 font-bold text-sm mt-1 mb-6 italic">Redeemable for acts of a highly classified nature</p>

            <!-- Balance Display -->
            <div class="bg-white rounded-2xl py-8 px-4 shadow-sm border border-gray-100 mb-6 relative">
                <div class="text-xs uppercase tracking-widest font-bold text-gray-400 mb-2">Current Balance</div>
                <div id="balance" class="text-7xl font-black text-indigo-600 transition-colors duration-300">
                    0
                </div>
            </div>

            <div class="mb-6 bg-white/60 rounded-2xl p-4 shadow-sm border border-white">
                <div class="text-xs uppercase tracking-widest font-bold text-gray-500 mb-3">Select Amount</div>
                
                <div class="flex flex-wrap items-center justify-center gap-2 mb-3">
                    <button onclick="setAmount(1)" class="amt-btn active px-4 py-2 rounded-xl font-black active:scale-95" data-val="1">1</button>
                    <button onclick="setAmount(10)" class="amt-btn px-4 py-2 rounded-xl font-black active:scale-95" data-val="10">10</button>
                    <button onclick="setAmount(50)" class="amt-btn px-4 py-2 rounded-xl font-black active:scale-95" data-val="50">50</button>
                    <button onclick="setAmount(100)" class="amt-btn px-4 py-2 rounded-xl font-black active:scale-95" data-val="100">100</button>
                </div>
                
                <div class="flex items-center justify-center gap-3">
                    <label for="pointAmount" class="text-xs font-bold text-gray-400">CUSTOM:</label>
                    <input type="number" id="pointAmount" value="1" min="1" oninput="handleCustomInput()" class="w-24 text-center font-bold text-xl py-1 px-2 rounded-lg border-2 border-indigo-100 focus:border-indigo-400 focus:outline-none transition-colors text-indigo-700 bg-indigo-50 shadow-inner">
                </div>
            </div>

            <div class="flex items-center justify-center gap-6">
                <!-- Subtract Button -->
                <button onclick="adjustPoints('subtract')" class="group flex flex-col items-center focus:outline-none transition-transform hover:scale-105 active:scale-95">
                    <div class="w-16 h-16 bg-red-100 text-red-500 rounded-full flex items-center justify-center shadow-md group-hover:bg-red-200 group-active:bg-red-300 transition-colors">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M20 12H4" />
                        </svg>
                    </div>
                    <span class="mt-2 text-sm font-bold text-red-500">Subtract</span>
                </button>

                <!-- Add Button -->
                <button onclick="adjustPoints('add')" class="group flex flex-col items-center focus:outline-none transition-transform hover:scale-105 active:scale-95">
                    <div class="w-20 h-20 bg-green-500 text-white rounded-full flex items-center justify-center shadow-lg shadow-green-500/40 group-hover:bg-green-600 group-active:bg-green-700 transition-colors">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4" />
                        </svg>
                    </div>
                    <span class="mt-2 text-sm font-black text-green-600">Add</span>
                </button>
            </div>
        </div>
    </div>

    <script>
        // Initialize state and local storage
        let currentBalance = parseInt(localStorage.getItem('good_boy_points_tracker')) || 0;
        let currentDisplayVal = currentBalance;
        const balanceDisplay = document.getElementById('balance');
        const amountInput = document.getElementById('pointAmount');

        function updateDisplay(val) {
            // Only animate if the value actually changed
            if (currentDisplayVal !== val) {
                // Reset animation
                balanceDisplay.classList.remove('animate-pop');
                void balanceDisplay.offsetWidth; // Trigger reflow to restart animation
                balanceDisplay.classList.add('animate-pop');
                
                // Flash colors based on positive/negative change
                if (val > currentDisplayVal) {
                    balanceDisplay.classList.remove('text-indigo-600', 'text-red-500');
                    balanceDisplay.classList.add('text-green-500');
                } else if (val < currentDisplayVal) {
                    balanceDisplay.classList.remove('text-indigo-600', 'text-green-500');
                    balanceDisplay.classList.add('text-red-500');
                }

                // Return to default color after animation
                setTimeout(() => {
                    balanceDisplay.classList.remove('text-green-500', 'text-red-500');
                    balanceDisplay.classList.add('text-indigo-600');
                }, 300);
            }
            
            currentDisplayVal = val;
            balanceDisplay.innerText = val;
        }

        // Initialize display on load
        balanceDisplay.innerText = currentBalance;

        window.setAmount = (val) => {
            amountInput.value = val;
            handleCustomInput();
        }

        window.handleCustomInput = () => {
            const val = parseInt(amountInput.value);
            const buttons = document.querySelectorAll('.amt-btn');
            buttons.forEach(btn => {
                if (parseInt(btn.getAttribute('data-val')) === val) {
                    btn.classList.add('active');
                } else {
                    btn.classList.remove('active');
                }
            });
        }

        window.adjustPoints = (action) => {
            let amount = parseInt(amountInput.value);
            // Default to 1 if empty or invalid
            if (isNaN(amount) || amount <= 0) {
                amount = 1;
                amountInput.value = 1;
            }

            if (action === 'add') {
                currentBalance += amount;
            } else if (action === 'subtract') {
                currentBalance -= amount;
            }

            // Save to local storage
            localStorage.setItem('good_boy_points_tracker', currentBalance);
            
            // Update UI
            updateDisplay(currentBalance);
        }
    </script>
</body>
</html>
